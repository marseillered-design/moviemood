п»ҝ<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favorites ГўвӮ¬вҖқ MovieMood</title>
  <link rel="stylesheet" href="style.css?v=20260306a">
</head>
<body class="home-body">
  <!-- Background Effects -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="noise-overlay"></div>

  <!-- NAV -->
  <nav class="home-nav">
    <a href="index.html" class="nav-logo">MOVIEMOOD</a>
    <div>
      
      <button id="theme-toggle" class="theme-toggle" aria-label="ГҗЕёГҗВөГ‘вӮ¬ГҗВөГҗВәГҗВ»Г‘ЕҪГ‘вҖЎГҗВёГ‘вҖҡГ‘Е’ Г‘вҖҡГҗВөГҗВјГ‘Ж’">
        <span class="icon-sun">ГўЛңвӮ¬ГҜВёВҸ</span>
        <span class="icon-moon">Г°ЕёЕ’в„ў</span>
      </button>
    </div>
  </nav>

  <!-- HEADER -->
  <header class="page-header">
    <h1 class="page-title">My Favorites</h1>
    <p class="fav-count" id="favCount"></p>
  </header>

  <!-- MAIN -->
  <main class="home-main">
    <!-- EMPTY STATE -->
    <div class="fav-empty" id="emptyState" style="display: none;">
      <div class="fav-empty-icon">Г°ЕёЕҪВ¬</div>
      <h2>No favorites yet</h2>
      <p>Explore movies and hit ГўВқВӨГҜВёВҸ to save them here</p>
      <a href="index.html" class="btn-discover">Discover Movies</a>
    </div>

    <!-- FAVORITES GRID -->
    <div class="fav-grid" id="favoritesGrid"></div>

    <!-- CLEAR ALL -->
    <div class="fav-actions" id="favActions" style="display: none;">
      <button class="btn-clear-all" id="clearAllBtn">Г°ЕёвҖ”вҖҳГҜВёВҸ Clear all favorites</button>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="home-footer">
    <p>Powered by TMDB API</p>
  </footer>

  <!-- THEME TOGGLE SCRIPT -->
  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const root = document.documentElement;
    
    const savedTheme = localStorage.getItem('theme');
    const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    
    if (savedTheme === 'light') {
      root.setAttribute('data-theme', 'light');
    } else if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
      root.setAttribute('data-theme', 'dark');
    }
    
    themeToggle?.addEventListener('click', () => {
      const currentTheme = root.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });
  </script>

  <!-- FAVORITES SCRIPT -->
  <script src="favorites.js?v=20260306a"></script>
</body>
</html>
