<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieMood - Discover Movies by Mood</title>
  <link rel="stylesheet" href="style.css?v=20260307c">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body class="home-body">
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="noise-overlay"></div>

  <nav class="home-nav">
    <a href="index.html" class="nav-logo">MOVIEMOOD</a>
    <div>
      <a href="feed.html" class="nav-favorites">&#x1F3AC; Feed</a>
      <a href="favorites.html" class="nav-favorites">&#x2764;&#xFE0F; Favorites</a>
      <a href="seen.html" class="nav-favorites">&#x1F37F; Seen</a>
      <button id="theme-toggle" class="theme-toggle" onclick="window.__mmToggleTheme && window.__mmToggleTheme()" aria-label="Toggle theme">
        <span class="icon-sun">&#x2600;&#xFE0F;</span>
        <span class="icon-moon">&#x1F319;</span>
      </button>
    </div>
  </nav>

  <header class="home-hero">
    <h1 class="home-title">WHAT'S YOUR <span class="title-accent">MOOD?</span></h1>
    <p class="home-subtitle">Tell us how you feel - we'll find the perfect film.</p>
  </header>

  <main class="home-main">
    <section class="search-section">
      <div class="search-container">
        <div class="search-input-wrapper">
          <span class="search-icon">&#x1F50D;</span>
          <input type="text" class="mood-input" placeholder="e.g. 'horrors of 90s' or 'dark sci-fi like Interstellar'" id="moodInput">
          <button class="mood-picker-btn" id="moodPickerBtn">&#x1F60A;</button>
        </div>
        <button class="search-btn" id="searchBtn">Search</button>
        <button class="surprise-btn" id="surpriseBtn">&#x1F3B2;</button>
        <button class="filters-btn" id="filtersBtn">&#x1F3AC; Content</button>

        <div class="mood-picker-popup" id="moodPickerPopup">
          <div class="mood-picker-arrow"></div>
          <div class="mood-picker-grid">
            <button class="mood-pick-btn" data-mood="funny"><span class="mood-emoji">&#x1F602;</span><span class="mood-label">Funny</span></button>
            <button class="mood-pick-btn" data-mood="sad"><span class="mood-emoji">&#x1F622;</span><span class="mood-label">Sad</span></button>
            <button class="mood-pick-btn" data-mood="scary"><span class="mood-emoji">&#x1F631;</span><span class="mood-label">Scary</span></button>
            <button class="mood-pick-btn" data-mood="action"><span class="mood-emoji">&#x1F525;</span><span class="mood-label">Action</span></button>
            <button class="mood-pick-btn" data-mood="romance"><span class="mood-emoji">&#x1F495;</span><span class="mood-label">Romance</span></button>
            <button class="mood-pick-btn" data-mood="mind"><span class="mood-emoji">&#x1F914;</span><span class="mood-label">Mind-blowing</span></button>
            <button class="mood-pick-btn" data-mood="family"><span class="mood-emoji">&#x1F468;&#x200D;&#x1F469;&#x200D;&#x1F467;</span><span class="mood-label">Family</span></button>
            <button class="mood-pick-btn" data-mood="mystery"><span class="mood-emoji">&#x1F575;&#xFE0F;</span><span class="mood-label">Mystery</span></button>
            <button class="mood-pick-btn" data-mood="inspiring"><span class="mood-emoji">&#x1F4AA;</span><span class="mood-label">Inspiring</span></button>
            <button class="mood-pick-btn" data-mood="animated"><span class="mood-emoji">&#x1F3A8;</span><span class="mood-label">Animated</span></button>
            <button class="mood-pick-btn" data-mood="historical"><span class="mood-emoji">&#x1F3DB;&#xFE0F;</span><span class="mood-label">Historical</span></button>
            <button class="mood-pick-btn" data-mood="musical"><span class="mood-emoji">&#x1F3B5;</span><span class="mood-label">Musical</span></button>
          </div>
        </div>
      </div>

<div class="region-row">
        <span class="region-label">&#x1F30D; Streaming region:</span>
        <select class="country-select" id="countrySelect">
          <option value="US">&#x1F1FA;&#x1F1F8; United States</option>
          <option value="CA">&#x1F1E8;&#x1F1E6; Canada</option>
          <option value="GB">&#x1F1EC;&#x1F1E7; United Kingdom</option>
          <option value="DE">&#x1F1E9;&#x1F1EA; Germany</option>
          <option value="FR">&#x1F1EB;&#x1F1F7; France</option>
          <option value="IT">&#x1F1EE;&#x1F1F9; Italy</option>
          <option value="ES">&#x1F1EA;&#x1F1F8; Spain</option>
          <option value="NL">&#x1F1F3;&#x1F1F1; Netherlands</option>
          <option value="UA">&#x1F1FA;&#x1F1E6; Ukraine</option>
        </select>
      </div>

      <div class="filters-panel" id="filtersPanel">
        <div class="filters-panel-inner">
          <div class="filter-group">
            <span class="filter-group-label">Content type</span>
            <div class="content-tabs">
              <button class="tab active" data-type="movie">&#x1F3AC; Movies</button>
              <button class="tab" data-type="tv">&#x1F4FA; Series</button>
              <button class="tab" data-type="documentary">&#x1F3A5; Documentary</button>
            </div>
          </div>
          <div class="filter-group">
            <span class="filter-group-label">Options</span>
            <label class="anime-toggle">
              <input type="checkbox" id="animeToggle">
              &#x1F38C; Include Anime
            </label>
          </div>
        </div>
      </div>
    </section>

    <section class="results-section">
      <div class="movies-grid" id="moviesGrid">
        <div class="welcome-message">
          <p class="example-text">Try: "horrors of 90s" &#x00B7; "80s action" &#x00B7; "dark sci-fi like Interstellar"</p>
        </div>
      </div>
      <button class="load-more-btn" id="loadMoreBtn" style="display: none;">Load More</button>
    </section>
  </main>

  <footer class="home-footer">
    <p>Powered by TMDB API</p>
  </footer>

  <script>
  (function () {
    const root = document.documentElement;

    function safeGetTheme() {
      try { return localStorage.getItem('theme'); } catch (e) { return null; }
    }

    function safeSetTheme(theme) {
      try { localStorage.setItem('theme', theme); } catch (e) {}
    }

    function applyTheme(theme) {
      root.setAttribute('data-theme', theme === 'light' ? 'light' : 'dark');
    }

    const savedTheme = safeGetTheme();
    const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(savedTheme || (systemPrefersDark ? 'dark' : 'light'));

    window.__mmToggleTheme = function () {
      const currentTheme = root.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      applyTheme(newTheme);
      safeSetTheme(newTheme);
    };

    const themeToggle = document.getElementById('theme-toggle');
    themeToggle?.addEventListener('click', window.__mmToggleTheme);
  })();
  </script>
  <script src="script.js?v=20260315b"></script>
</body>
</html>
