<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieMood</title>
  <link rel="stylesheet" href="style.css?v=20260306a">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="home-body">
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="noise-overlay"></div>

  <nav class="home-nav">
    <a href="index.html" class="nav-logo" style="-webkit-text-fill-color:transparent">MovieMood</a>
    <div>
      <a href="feed.html" class="nav-favorites">&#x1F3AC; Feed</a>
      <a href="favorites.html" class="nav-favorites">&#x2764;&#xFE0F; Favorites</a>
      <a href="seen.html" class="nav-favorites">&#x1F37F; Seen</a>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
        <span class="icon-sun">&#x2600;&#xFE0F;</span>
        <span class="icon-moon">&#x1F319;</span>
      </button>
    </div>
  </nav>

  <div class="person-hero-section">
    <div class="person-hero-blur" id="personHeroBlur"></div>
    <div class="person-hero-gradient"></div>
    <div class="person-hero-content">
      <div class="person-photo-wrapper">
        <img id="personPhoto" src="" alt="" class="person-photo">
      </div>
      <div class="person-meta">
        <div class="person-badges" id="personBadges"></div>
        <h1 class="person-name" id="personName"></h1>
        <div class="person-details" id="personDetails"></div>
        <p class="person-bio" id="personBio"></p>
      </div>
    </div>
  </div>

  <main class="home-main">
    <section class="person-films-section">
      <h2 class="section-heading" id="personMoviesTitle"></h2>
      <div class="movies-grid" id="moviesGrid"></div>
    </section>
  </main>

  <footer class="home-footer">
    <p>Powered by TMDB API</p>
  </footer>

  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const root = document.documentElement;

    const savedTheme = localStorage.getItem('theme');
    const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    if (savedTheme === 'light') {
      root.setAttribute('data-theme', 'light');
    } else if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
      root.setAttribute('data-theme', 'dark');
    }

    themeToggle?.addEventListener('click', () => {
      const currentTheme = root.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });
  </script>

  <script src="person.js?v=20260306a"></script>
</body>
</html>
